# .github/workflows/ci.yml
name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test